x-templates:
  oro-app: &oro-app
    image: "algoritmadev/orobox:{{.OroVersion}}-{{.Type}}-latest"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  volumes-app: &volumes-app
    {{if eq .Type "project" -}}
    - "{{.BundlePath}}:/var/www/oro"
    {{- else -}}
    - "oro_app:/var/www/oro"
    {{if eq .Type "bundle" -}}
    - "{{.BundlePath}}:/var/www/oro/src/{{.BundleNamespace}}"
    {{- end}}
    {{- end}}
    - "cache:/var/www/oro/var/cache"
    - "public_storage:/var/www/oro/public/media"
    - "private_storage:/var/www/oro/var/data"

services:
  application_test:
    <<: *oro-app
    user: ${ORO_USER_RUNTIME:-www-data}
    command:
      - bash
      - -c
      - |
        echo "Test application is running..."
        exec tail -f /dev/null
    env_file:
      - .env
      - .env.test
    environment:
      ORO_ENV: test
      ORO_XDEBUG_ENABLED: "false"
    volumes: *volumes-app

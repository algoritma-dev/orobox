{{range $index, $domain := .Domains}}
server {
    listen 80{{if eq $index 0}} default_server{{end}};
    server_name {{.Host}};
    root {{$.OroRootDir}}/{{.Root}};

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /media/cache/resolve {
        expires max;
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /media {
        expires max;
        add_header Cache-Control "public";
        try_files $uri /index.php$is_args$args;
    }

    location ~* ^[^?]+\.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?|eot|otf|ttf|map)$ {
        expires max;
        add_header Cache-Control "public";
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-fpm-app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        {{if .Ssl}}fastcgi_param HTTPS on;{{end}}
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 600s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}

{{if .Ssl}}
server {
    listen 443 ssl;
    server_name {{.Host}};
    root {{$.OroRootDir}}/{{.Root}};

    ssl_certificate /etc/nginx/certs/{{.Host}}.pem;
    ssl_certificate_key /etc/nginx/certs/{{.Host}}-key.pem;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /media/cache/resolve {
        expires max;
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /media {
        expires max;
        add_header Cache-Control "public";
        try_files $uri /index.php$is_args$args;
    }

    location ~* ^[^?]+\.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?|eot|otf|ttf|map)$ {

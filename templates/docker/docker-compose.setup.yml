x-templates:
  oro-app: &oro-app
    image: "orobox-app:{{.OroVersion}}-{{.Type}}-latest"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "{{.PHPVersion}}"
        NODE_VERSION: "{{.NodeVersion}}"
        NPM_VERSION: "{{.NpmVersion}}"
        MEMORY_LIMIT: "${PHP_MEMORY_LIMIT:-2048M}"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  volumes-setup: &volumes-setup
    {{if eq .Type "project" -}}
    - "{{.BundlePath}}:/var/www/oro"
    {{- else -}}
    - "oro_app:/var/www/oro"
    {{if eq .Type "bundle" -}}
    - "{{.BundlePath}}:/var/www/oro/src/{{.BundleNamespace}}"
    {{- end}}
    - "cache:/var/www/oro/var/cache"
    - "public_storage:/var/www/oro/public/media"
    - "private_storage:/var/www/oro/var/data"
    {{- end}}

services:
  install:
    <<: *oro-app
    command: install ${ORO_INSTALL_OPTIONS}
    user: ${ORO_USER_RUNTIME:-www-data}
    environment:
      ORO_SAMPLE_DATA: ${ORO_SAMPLE_DATA:-y}
      ORO_XDEBUG_ENABLED: ${ORO_INSTALL_XDEBUG_ENABLED:-false}
    depends_on:
      "gotenberg":
        condition: service_healthy
      {{if .Postgres -}}
      "db":
        condition: service_healthy
      {{- end}}
      {{if .Mailpit -}}
      "mail":
        condition: service_started
      {{- end}}
      {{if .Redis -}}
      "redis":
        condition: service_healthy
      {{- end}}
      {{if .RabbitMQ -}}
      "rabbitmq":
        condition: service_started
      {{- end}}
      {{if .Elasticsearch -}}
      "elasticsearch":
        condition: service_started
      {{- end}}
    volumes: *volumes-setup

x-templates:
  oro-app: &oro-app
    image: "algoritmadev/orobox:{{.OroVersion}}-{{.Type}}-latest"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  volumes-setup: &volumes-setup
    {{if eq .Type "project" -}}
    - "{{.BundlePath}}:/var/www/oro:cached"
    {{- else -}}
    - "oro_app:/var/www/oro:delegated"
    {{if eq .Type "bundle" -}}
    - "{{.BundlePath}}:{{.BundleRootContainerPath}}:cached"
    - "{{.BundlePath}}/vendor-oro:/var/www/oro/vendor:delegated"
    {{- end}}
    - "cache:/var/www/oro/var/cache:delegated"
    - "public_storage:/var/www/oro/public/media:delegated"
    - "private_storage:/var/www/oro/var/data:delegated"
    {{- end}}

services:
  volume-setup:
    <<: *oro-app
    user: root
    command:
      - bash
      - -c
      - |
        echo "Initializing volumes and permissions for ${ORO_USER_RUNTIME:-www-data}..."
        mkdir -p bin config public src templates translations var assets var/cache var/logs var/data public/media vendor
        {{if eq .Type "bundle" -}}
        if [ -d /vendor-host ] && [ -z "$$(ls -A /vendor-host)" ]; then
            echo "Populating vendor folder on host from container..."
            cp -rp vendor/. /vendor-host/
        fi

        if [ -n "{{.BundlePackageName}}" ]; then
            echo "Configuring bundle {{.BundlePackageName}} as path repository..."
            # Configure composer repository for the bundle
            # Use relative path from /var/www/oro to the bundle root
            COMPOSER_ALLOW_SUPERUSER=1 composer config repositories.bundle '{"type": "path", "url": "bundles/{{.BundleNamespace}}", "options": {"symlink": true}}'
            # Require the bundle package
            # We use --no-scripts to avoid running OroCommerce scripts too early
            COMPOSER_ALLOW_SUPERUSER=1 composer require "{{.BundlePackageName}}:@dev" --no-interaction --no-scripts
        fi
        {{- end}}
        chown -R ${ORO_USER_RUNTIME:-www-data} . bin config public src templates translations var assets var/cache var/logs var/data public/media vendor 2>/dev/null || true
        {{if eq .Type "bundle" -}}
        [ -d /vendor-host ] && chown -R ${ORO_USER_RUNTIME:-www-data} /vendor-host 2>/dev/null || true
        {{- end}}
        chmod -R 777 var/cache var/logs var/data 2>/dev/null || true
        true
    environment:
      ORO_XDEBUG_ENABLED: "false"
    volumes:
    {{if eq .Type "project" -}}
    - "{{.BundlePath}}:/var/www/oro:cached"
    {{- else -}}
    - "oro_app:/var/www/oro:delegated"
    {{if eq .Type "bundle" -}}
    - "{{.BundlePath}}:{{.BundleRootContainerPath}}:cached"
    - "{{.BundlePath}}/vendor-oro:/vendor-host:delegated"
    {{- end}}
    - "cache:/var/www/oro/var/cache:delegated"
    - "public_storage:/var/www/oro/public/media:delegated"
    - "private_storage:/var/www/oro/var/data:delegated"
    {{- end}}

  install:
    <<: *oro-app
    command: install ${ORO_INSTALL_OPTIONS}
    user: ${ORO_USER_RUNTIME:-www-data}
    environment:
      ORO_SAMPLE_DATA: ${ORO_SAMPLE_DATA:-y}
      ORO_XDEBUG_ENABLED: ${ORO_INSTALL_XDEBUG_ENABLED:-false}
    depends_on:
      "volume-setup":
        condition: service_completed_successfully
      "gotenberg":
        condition: service_healthy
      {{if .Postgres -}}
      "db":
        condition: service_healthy
      {{- end}}
      {{if .Mailpit -}}
      "mail":
        condition: service_started
      {{- end}}
      {{if .Redis -}}
      "redis":
        condition: service_healthy
      {{- end}}
      {{if .RabbitMQ -}}
      "rabbitmq":
        condition: service_started
      {{- end}}
      {{if .Elasticsearch -}}
      "elasticsearch":
        condition: service_started
      {{- end}}
    volumes: *volumes-setup
